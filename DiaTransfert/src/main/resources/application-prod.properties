# ============================================================================
# PRODUCTION PROFILE CONFIGURATION
# ============================================================================

# Activer le profil prod
spring.profiles.active=prod

# Logging minimal en production
logging.level.root=WARN
logging.level.com.transfertcabinet.app=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=ERROR

# Hibernate - Validation uniquement
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Connection Pool - Optimise pour production
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000

# Actuator - Endpoints restreints
management.endpoints.web.exposure.include=health,info

# Desactiver DevTools
spring.devtools.restart.enabled=false

# JWT - Expiration plus courte en production
jwt.expiration=3600000