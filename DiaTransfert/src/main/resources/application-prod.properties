# ============================================================================
# PRODUCTION PROFILE CONFIGURATION - RAILWAY
# ============================================================================

# Logging minimal en production
logging.level.root=WARN
logging.level.com.transfertcabinet.app=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=ERROR

# Hibernate - Mettre 'update' pour la première fois, puis 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Connection Pool - Optimise pour production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Actuator - Endpoints restreints
management.endpoints.web.exposure.include=health,info

# Desactiver DevTools
spring.devtools.restart.enabled=false

# JWT - Expiration plus courte en production
jwt.expiration=3600000