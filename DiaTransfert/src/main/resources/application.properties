# ============================================================================
# APPLICATION CONFIGURATION - TRANSFERTCABINET
# ============================================================================

# Application
spring.application.name=transfertcabinet-backend
server.port=8080
server.servlet.context-path=/api

# ============================================================================
# DATABASE CONFIGURATION - MYSQL (RAILWAY)
# ============================================================================

# MySQL Connection - Utilisation des variables Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=TransfertCabinetHikariCP
spring.datasource.hikari.auto-commit=false

# ============================================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================================

# Hibernate - CRUCIAL: use 'update' or 'none', not 'create' or 'create-drop'
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Hibernate Statistics (désactiver en production)
spring.jpa.properties.hibernate.generate_statistics=false

# Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# ============================================================================
# DATA INITIALIZATION - DÉSACTIVÉ (plus de réinsertion automatique)
# ============================================================================

# Désactiver l'initialisation automatique des données
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ============================================================================
# JWT SECURITY CONFIGURATION
# ============================================================================

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

# Logging
logging.level.root=INFO
logging.level.com.transfertcabinet.app=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.engine.transaction.internal.TransactionImpl=DEBUG

# Log File
logging.file.name=logs/transfertcabinet.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %cyan(%logger{36}) - %msg%n

# ============================================================================
# ACTUATOR CONFIGURATION (Monitoring)
# ============================================================================

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
management.health.db.enabled=true
management.metrics.export.prometheus.enabled=true

# ============================================================================
# JACKSON CONFIGURATION (JSON Serialization)
# ============================================================================

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================================
# FILE UPLOAD CONFIGURATION
# ============================================================================

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ============================================================================
# INTERNATIONALIZATION (i18n)
# ============================================================================

# Locale
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ============================================================================
# CACHE CONFIGURATION
# ============================================================================

# Cache
spring.cache.type=simple
spring.cache.cache-names=clients,transactions,categories

# ============================================================================
# DEVTOOLS CONFIGURATION
# ============================================================================

# DevTools - Désactivé en production
spring.devtools.restart.enabled=false
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.livereload.enabled=false

# ============================================================================
# APPLICATION SPECIFIC CONFIGURATION
# ============================================================================

# Application Settings
app.name=TransfertCabinet
app.version=1.0.0
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4200,http://localhost:3000}
app.pagination.default-page-size=20
app.pagination.max-page-size=100

# Business Rules
app.business.currency-code=GNF
app.business.decimal-places=0
app.business.max-debt-amount=100000000.00
app.business.reminder-default-time=09:00:00