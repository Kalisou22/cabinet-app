# ============================================================================
# DEVELOPMENT PROFILE CONFIGURATION
# ============================================================================

# Logging plus verbeux pour le dÈveloppement
logging.level.com.transfertcabinet.app=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Hibernate - Creation des tables
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL pour le developpement local
spring.datasource.url=jdbc:mysql://localhost:3306/transfertcabinet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT - Expiration plus longue pour developpement
jwt.expiration=864000000

# Desactiver certaines securites en dev
app.security.enable-csrf=false