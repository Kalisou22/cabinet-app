# ============================================================================
# DEVELOPMENT PROFILE CONFIGURATION
# ============================================================================

# Activer le profil dev
spring.profiles.active=dev

# Logging plus verbeux pour le développement
logging.level.com.transfertcabinet.app=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Hibernate - Création des tables
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Base de données H2 pour développement (optionnel)
#spring.datasource.url=jdbc:h2:mem:transfertcabinet_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JWT - Expiration plus longue pour développement
jwt.expiration=864000000

# Désactiver certaines sécurités en dev
app.security.enable-csrf=false